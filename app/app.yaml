command:
  - "uvicorn"
  - "main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: KA_ENDPOINT_NAME
    value: "ka-3306ffae-endpoint"
  - name: SBAR_VOLUME_PATH
    value: "/Volumes/kk_test/sbar_briefing/sbar_documents"
  - name: SUPP_VOLUME_PATH
    value: "/Volumes/kk_test/sbar_briefing/supplemental_docs"
  - name: DRAFT_INPUTS_VOLUME_PATH
    value: "/Volumes/kk_test/sbar_briefing/draft_inputs"
  - name: LLM_MODEL_NAME
    value: "databricks-claude-sonnet-4-6"
  - name: NOTIFICATION_SLACK_WEBHOOK_URL
    value: ""
  - name: NOTIFICATION_EXEC_LIST
    value: "ceo@regionalhealth.example.com,cfo@regionalhealth.example.com,coo@regionalhealth.example.com,cmo@regionalhealth.example.com,cno@regionalhealth.example.com,board.chair@regionalhealth.example.com"
  - name: LAKEBASE_INSTANCE
    value: "hls-lakebase-demo"
  - name: LAKEBASE_PG_DATABASE
    value: "sbar_briefing"
  - name: LAKEBASE_PG_SCHEMA
    value: "sbar"
  - name: AUTHOR_USER_EMAILS
    value: "kiara.koeppen@databricks.com"
