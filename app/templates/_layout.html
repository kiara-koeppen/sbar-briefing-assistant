<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}SBAR Briefing Assistant{% endblock %}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<header class="topbar">
  <div class="topbar-left">
    <a href="/" class="logo">SBAR Briefing Assistant</a>
    <span class="sep"></span>
    <span class="muted">Regional Health System</span>
  </div>
  <div class="topbar-right">
    <span class="role-pill">{{ user.role_label }}</span>
    <span class="user-email">{{ user.email }}</span>
    {% if user.is_author %}<a href="/author" class="nav-link">Author View</a>{% endif %}
    {% if user.is_author %}<a href="/author/drafts/new" class="nav-link">New Draft</a>{% endif %}
    <a href="/" class="nav-link">Executive View</a>
  </div>
</header>
<main>{% block content %}{% endblock %}</main>
</body>
</html>
