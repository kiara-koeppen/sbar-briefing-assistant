resources:
  apps:
    sbar_briefing_assistant:
      name: ${var.app_name}
      description: |
        Executive SBAR Briefing Assistant. Renders the latest SBAR alongside a
        Knowledge Assistant chat panel. Logs every interaction to Lakebase for
        the in-app Author View.
      source_code_path: ../app

      # Resource bindings: KA endpoint, Lakebase database, SBAR volume.
      # The SP that runs the App needs CAN_QUERY on the KA endpoint,
      # CAN_CONNECT_AND_CREATE on the Lakebase, and READ_VOLUME on the volume.
      # See README "Post-deploy steps" for the additional Postgres GRANT
      # needed inside the Lakebase database.
      resources:
        - name: ka-endpoint
          description: "Knowledge Assistant serving endpoint"
          serving_endpoint:
            name: ${var.ka_endpoint_name}
            permission: CAN_QUERY

        - name: lakebase
          description: "Lakebase Postgres for the audit log"
          database:
            instance_name: ${var.lakebase_instance}
            database_name: ${var.lakebase_pg_database}
            permission: CAN_CONNECT_AND_CREATE

        - name: sbar-volume
          description: "UC volume of SBAR markdown documents (read for executive view, write for publishing drafts)"
          uc_securable:
            securable_full_name: ${var.catalog}.${resources.schemas.sbar_briefing_schema.name}.${var.sbar_volume}
            securable_type: VOLUME
            permission: WRITE_VOLUME

        - name: draft-inputs-volume
          description: "UC volume for per-draft source documents (read+write so the App can save uploads)"
          uc_securable:
            securable_full_name: ${var.catalog}.${resources.schemas.sbar_briefing_schema.name}.${var.draft_inputs_volume}
            securable_type: VOLUME
            permission: WRITE_VOLUME
